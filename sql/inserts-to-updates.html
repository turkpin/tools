<!DOCTYPE html>
<html lang="tr" class="h-full overflow-hidden">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INSERT → UPDATE Dönüştürücü</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      corePlugins: {
        preflight: false,
      },
      theme: {
        extend: {
          colors: {
            bg:       '#0d0d0f',
            surface:  '#141417',
            surface2: '#1c1c21',
            border:   '#2a2a32',
            accent:   '#f0c040',
            accent2:  '#e07030',
            muted:    '#666680',
            green:    '#3ddc84',
            red:      '#ff5050',
          },
          fontFamily: {
            mono: ['"JetBrains Mono"', 'monospace'],
            syne: ['Syne', 'sans-serif'],
          },
          borderRadius: {
            DEFAULT: '8px',
          },
        },
      },
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.6;
    }

    .header-underline::after {
      content: ''; position: absolute; bottom: -1px; left: 3rem;
      width: 80px; height: 2px; background: #f0c040;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }
    .dot-pulse { animation: pulse-dot 2s ease-in-out infinite; }

    textarea { caret-color: #f0c040; tab-size: 2; }
    textarea::placeholder { color: #666680; opacity: 0.5; font-size: 0.75rem; }
    textarea::-webkit-scrollbar,
    .output-wrap::-webkit-scrollbar { width: 6px; }
    textarea::-webkit-scrollbar-thumb,
    .output-wrap::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 3px; }

    .output-area .kw       { color: #c792ea; }
    .output-area .tbl      { color: #f0c040; font-weight: 600; }
    .output-area .val      { color: #3ddc84; }
    .output-area .punct    { color: #666680; }
    .output-area .where-kw { color: #e07030; font-weight: 600; }
    .output-area .cmt      { color: #666680; font-style: italic; }

    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr !important; height: auto !important; }
      .panel { border-right: none !important; border-bottom: 1px solid #2a2a32; min-height: 42vh; }
      textarea, .output-area { font-size: 0.72rem !important; }
      .header-pad { padding: 1.5rem !important; }
    }
  </style>
</head>
<body class="bg-bg text-[#e8e8f0] font-syne overflow-hidden h-full flex flex-col">

<header class="header-pad header-underline relative flex items-baseline gap-4 px-12 pt-10 pb-6 border-b border-border flex-shrink-0">
  <h1 class="text-[1.6rem] font-extrabold tracking-tight">INSERT <span class="text-accent">→</span> UPDATE</h1>
  <span class="font-mono text-[0.65rem] font-semibold text-muted bg-surface2 border border-border px-2 py-[3px] rounded tracking-widest uppercase">SQL Tool</span>
</header>

<div class="main-grid grid grid-cols-2 flex-1 min-h-0">

  <!-- INPUT PANEL -->
  <div class="panel flex flex-col border-r border-border">
    <div class="flex items-center justify-between px-6 py-4 border-b border-border bg-surface flex-shrink-0">
      <span class="font-mono text-[0.7rem] font-semibold tracking-[2px] uppercase text-muted flex items-center gap-2">
        <span class="dot-pulse w-[7px] h-[7px] rounded-full bg-accent2 inline-block"></span>
        INSERT Sorguları
      </span>
      <div class="flex gap-2">
        <button class="font-mono text-[0.68rem] font-semibold tracking-[0.5px] px-[14px] py-[6px] rounded border border-border bg-surface2 text-muted cursor-pointer transition-all duration-150 hover:border-red hover:text-red hover:bg-red/[0.06]" onclick="clearInput()">Temizle</button>
        <button class="font-mono text-[0.68rem] font-bold tracking-[0.5px] px-[14px] py-[6px] rounded border border-accent bg-accent text-black cursor-pointer transition-all duration-150 hover:bg-[#ffd060]" onclick="convert()">▶ Dönüştür</button>
      </div>
    </div>

    <div class="flex items-center gap-6 px-6 py-[0.6rem] bg-surface2 border-b border-border flex-shrink-0 flex-wrap">
      <label class="font-mono text-[0.65rem] text-muted tracking-[0.8px] uppercase flex items-center gap-[6px] cursor-pointer select-none transition-colors duration-150 hover:text-[#e8e8f0]">
        <input type="checkbox" id="opt_where" checked class="accent-accent w-3 h-3 cursor-pointer" />
        WHERE koşulu:
        <input type="text" id="where_col" value="prd_id" placeholder="kolon adı"
          class="bg-bg border border-border text-[#e8e8f0] font-mono text-[0.65rem] px-2 py-[3px] rounded w-[110px] outline-none transition-colors duration-150 focus:border-accent" />
      </label>
      <span class="w-px h-4 bg-border"></span>
      <label class="font-mono text-[0.65rem] text-muted tracking-[0.8px] uppercase flex items-center gap-[6px] cursor-pointer select-none transition-colors duration-150 hover:text-[#e8e8f0]">
        <input type="checkbox" id="opt_semicolon" checked class="accent-accent w-3 h-3 cursor-pointer" />
        Noktalı virgül
      </label>
      <span class="w-px h-4 bg-border"></span>
      <label class="font-mono text-[0.65rem] text-muted tracking-[0.8px] uppercase flex items-center gap-[6px] cursor-pointer select-none transition-colors duration-150 hover:text-[#e8e8f0]">
        <input type="checkbox" id="opt_skip_where_col" checked class="accent-accent w-3 h-3 cursor-pointer" />
        WHERE kolonunu SET'ten çıkar
      </label>
    </div>

    <textarea id="input" spellcheck="false"
      class="flex-1 bg-bg text-[#e8e8f0] font-mono text-[0.8rem] leading-[1.7] p-6 border-none outline-none resize-none w-full"
      placeholder="INSERT INTO \`products\` (\`id\`, \`name\`) VALUES&#10;(1, 'Ahmet'),&#10;(2, 'Mehmet');"
      oninput="updateInputStats()"></textarea>

    <div class="h-7 bg-surface border-t border-border flex items-center px-6 gap-6 flex-shrink-0">
      <span class="font-mono text-[0.65rem] text-muted">Satır: <strong id="stat_lines" class="text-accent font-bold">0</strong></span>
      <span class="font-mono text-[0.65rem] text-muted">INSERT: <strong id="stat_inserts" class="text-accent font-bold">0</strong></span>
      <span class="font-mono text-[0.65rem] text-muted">Hata: <strong id="stat_errors" class="text-accent font-bold">0</strong></span>
    </div>
  </div>

  <!-- OUTPUT PANEL -->
  <div class="panel flex flex-col">
    <div class="flex items-center justify-between px-6 py-4 border-b border-border bg-surface flex-shrink-0">
      <span class="font-mono text-[0.7rem] font-semibold tracking-[2px] uppercase text-muted flex items-center gap-2">
        <span class="dot-pulse w-[7px] h-[7px] rounded-full bg-green inline-block"></span>
        UPDATE Sorguları
      </span>
      <div class="flex gap-2">
        <button class="font-mono text-[0.68rem] font-semibold tracking-[0.5px] px-[14px] py-[6px] rounded border border-border bg-surface2 text-muted cursor-pointer transition-all duration-150 hover:border-accent hover:text-accent hover:bg-accent/[0.06]" onclick="copyAll()">Kopyala</button>
        <button class="font-mono text-[0.68rem] font-semibold tracking-[0.5px] px-[14px] py-[6px] rounded border border-border bg-surface2 text-muted cursor-pointer transition-all duration-150 hover:border-red hover:text-red hover:bg-red/[0.06]" onclick="clearOutput()">Temizle</button>
      </div>
    </div>

    <div class="output-wrap flex-1 overflow-y-auto">
      <div class="output-area min-h-full bg-bg font-mono text-[0.8rem] leading-[1.7] p-6 whitespace-pre-wrap break-all text-[#e8e8f0]" id="output">
        <div class="flex flex-col items-center justify-center h-full gap-3 text-muted">
          <div class="text-[2.5rem] opacity-30">⚡</div>
          <p class="font-mono text-[0.72rem] tracking-widest uppercase opacity-50">Dönüştürülmüş sorgular burada görünecek</p>
        </div>
      </div>
    </div>

    <div class="h-7 bg-surface border-t border-border flex items-center px-6 gap-6 flex-shrink-0">
      <span class="font-mono text-[0.65rem] text-muted">Üretilen: <strong id="stat_produced" class="text-accent font-bold">0</strong></span>
      <span class="font-mono text-[0.65rem] text-muted">Başarılı: <strong id="stat_ok" class="text-green font-bold">0</strong></span>
      <span class="font-mono text-[0.65rem] text-muted">Başarısız: <strong id="stat_fail" class="text-red font-bold">0</strong></span>
    </div>
  </div>
</div>

<div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-5 bg-accent text-black font-mono text-[0.72rem] font-bold tracking-widest px-6 py-[10px] rounded opacity-0 transition-all duration-200 pointer-events-none z-[1000]"></div>

<script>
'use strict';

let lastResults = [];

function updateInputStats() {
  const val = document.getElementById('input').value;
  document.getElementById('stat_lines').textContent = val ? val.split('\n').length : 0;
  document.getElementById('stat_inserts').textContent = (val.match(/INSERT\s+INTO/gi) || []).length;
}

function readIdent(s, pos) {
  while (pos < s.length && /\s/.test(s[pos])) pos++;
  let name = '';
  if (s[pos] === '`') {
    pos++;
    while (pos < s.length && s[pos] !== '`') name += s[pos++];
    pos++;
  } else if (s[pos] === '"') {
    pos++;
    while (pos < s.length && s[pos] !== '"') name += s[pos++];
    pos++;
  } else {
    while (pos < s.length && /[\w$]/.test(s[pos])) name += s[pos++];
  }
  return { name, pos };
}

function readString(s, pos) {
  let val = "'";
  pos++;
  while (pos < s.length) {
    const ch = s[pos];
    if (ch === '\\') {
      val += ch + (s[pos + 1] || '');
      pos += 2;
    } else if (ch === "'") {
      val += ch;
      pos++;
      if (s[pos] === "'") {
        val += s[pos];
        pos++;
      } else {
        break;
      }
    } else {
      val += ch;
      pos++;
    }
  }
  return { val, pos };
}

function readValue(s, pos) {
  while (pos < s.length && /\s/.test(s[pos])) pos++;
  if (pos >= s.length) return { val: '', pos };
  const ch = s[pos];
  if (ch === "'") return readString(s, pos);
  if (s.substring(pos, pos + 4).toUpperCase() === 'NULL') return { val: 'NULL', pos: pos + 4 };
  let val = '';
  if (ch === '-' || ch === '+' || /\d/.test(ch)) {
    while (pos < s.length && /[-+\d.eE]/.test(s[pos])) val += s[pos++];
    return { val, pos };
  }
  let depth = 0;
  while (pos < s.length) {
    const c = s[pos];
    if (c === '(') { depth++; val += c; pos++; }
    else if (c === ')') {
      if (depth === 0) break;
      depth--; val += c; pos++;
    }
    else if (c === ',' && depth === 0) break;
    else if (c === "'") {
      const r = readString(s, pos);
      val += r.val;
      pos = r.pos;
    }
    else { val += c; pos++; }
  }
  return { val: val.trim(), pos };
}

function readRowValues(s, pos) {
  while (pos < s.length && /\s/.test(s[pos])) pos++;
  if (s[pos] !== '(') return null;
  pos++;
  const vals = [];
  while (pos < s.length) {
    while (pos < s.length && /\s/.test(s[pos])) pos++;
    if (s[pos] === ')') { pos++; break; }
    if (s[pos] === ',') { pos++; continue; }
    const r = readValue(s, pos);
    vals.push(r.val);
    pos = r.pos;
    while (pos < s.length && /\s/.test(s[pos])) pos++;
    if (s[pos] === ',') pos++;
    else if (s[pos] === ')') { pos++; break; }
  }
  return { vals, pos };
}

function parseInsertBlock(raw) {
  let pos = 0;
  while (pos < raw.length && /\s/.test(raw[pos])) pos++;
  const insMatch = /^INSERT\s+INTO\s+/i.exec(raw.substring(pos));
  if (!insMatch) return [];
  pos += insMatch[0].length;
  const tbl = readIdent(raw, pos);
  if (!tbl.name) return [];
  pos = tbl.pos;
  const table = tbl.name;
  while (pos < raw.length && /\s/.test(raw[pos])) pos++;
  if (raw[pos] !== '(') return [];
  pos++;
  const cols = [];
  while (pos < raw.length) {
    while (pos < raw.length && /[\s,]/.test(raw[pos])) pos++;
    if (raw[pos] === ')') { pos++; break; }
    const col = readIdent(raw, pos);
    if (col.name) cols.push(col.name);
    pos = col.pos;
  }
  if (cols.length === 0) return [];
  while (pos < raw.length && /\s/.test(raw[pos])) pos++;
  if (raw.substring(pos, pos + 6).toUpperCase() !== 'VALUES') return [];
  pos += 6;
  const rows = [];
  while (pos < raw.length) {
    while (pos < raw.length && /\s/.test(raw[pos])) pos++;
    if (raw[pos] !== '(') break;
    const row = readRowValues(raw, pos);
    if (!row) break;
    pos = row.pos;
    if (row.vals.length === cols.length) rows.push({ table, cols, vals: row.vals });
    while (pos < raw.length && /\s/.test(raw[pos])) pos++;
    if (raw[pos] === ',') { pos++; continue; }
    break;
  }
  return rows;
}

function splitIntoBlocks(raw) {
  const blocks = [];
  let cur = '';
  let inStr = false;
  for (let i = 0; i < raw.length; i++) {
    const ch = raw[i];
    if (inStr) {
      cur += ch;
      if (ch === '\\') { i++; if (i < raw.length) cur += raw[i]; }
      else if (ch === "'") {
        if (raw[i + 1] === "'") { i++; cur += raw[i]; }
        else inStr = false;
      }
    } else {
      if (ch === "'") { inStr = true; cur += ch; }
      else if (ch === ';') {
        const t = cur.trim();
        if (t && /INSERT\s+INTO/i.test(t)) blocks.push(t);
        cur = '';
      } else { cur += ch; }
    }
  }
  const last = cur.trim();
  if (last && /INSERT\s+INTO/i.test(last)) blocks.push(last);
  if (blocks.length > 0) return blocks;
  return raw
    .split(/\n(?=\s*INSERT\s+INTO\s)/i)
    .map(s => s.trim())
    .filter(s => /INSERT\s+INTO/i.test(s));
}

function buildUpdate(row, whereCol, addSemicolon, skipWhereCol) {
  const { table, cols, vals } = row;
  const whereIdx = whereCol
    ? cols.findIndex(c => c.toLowerCase() === whereCol.toLowerCase())
    : -1;
  const setPairs = [];
  for (let i = 0; i < cols.length; i++) {
    if (skipWhereCol && i === whereIdx) continue;
    setPairs.push('`' + cols[i] + '` = ' + vals[i]);
  }
  if (setPairs.length === 0) return null;
  const semi = addSemicolon ? ';' : '';
  const setClause = setPairs.join(',\n    ');
  if (whereIdx === -1 || !whereCol) {
    return 'UPDATE `' + table + '`\nSET\n    ' + setClause + semi;
  }
  return 'UPDATE `' + table + '`\nSET\n    ' + setClause + '\nWHERE `' + cols[whereIdx] + '` = ' + vals[whereIdx] + semi;
}

function highlight(sql) {
  const esc = sql.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc
    .replace(/\b(UPDATE|SET)\b/g, '<span class="kw">$1</span>')
    .replace(/\b(WHERE)\b/g, '<span class="where-kw">$1</span>')
    .replace(/`([^`]+)`/g, '`<span class="tbl">$1</span>`')
    .replace(/= (-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)\b/g, '= <span class="val">$1</span>')
    .replace(/= ('(?:[^'\\]|\\.)*')/g, '= <span class="val">$1</span>')
    .replace(/= (NULL)\b/gi, '= <span class="val">NULL</span>')
    .replace(/,\n/g, '<span class="punct">,</span>\n')
    .replace(/;$/m, '<span class="punct">;</span>');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function convert() {
  const raw = document.getElementById('input').value.trim();
  if (!raw) { showToast('Giriş boş!'); return; }
  const whereCol = document.getElementById('opt_where').checked
    ? document.getElementById('where_col').value.trim() : '';
  const addSemicolon = document.getElementById('opt_semicolon').checked;
  const skipWhereCol = document.getElementById('opt_skip_where_col').checked;
  const blocks = splitIntoBlocks(raw);
  let ok = 0, fail = 0;
  const parts = [];
  lastResults = [];
  blocks.forEach((block, bi) => {
    const rows = parseInsertBlock(block);
    if (rows.length === 0) {
      fail++;
      parts.push('<span class="cmt">-- [BLOK ' + (bi+1) + '] PARSE HATASI: ' + escHtml(block.replace(/\s+/g,' ').substring(0,60)) + '...</span>');
      lastResults.push(null);
      return;
    }
    rows.forEach((row, ri) => {
      const upd = buildUpdate(row, whereCol, addSemicolon, skipWhereCol);
      if (!upd) {
        fail++;
        parts.push('<span class="cmt">-- [' + (bi+1) + '.' + (ri+1) + '] SET boş, atlandı</span>');
        lastResults.push(null);
      } else {
        ok++;
        parts.push(highlight(upd));
        lastResults.push(upd);
      }
    });
  });
  document.getElementById('stat_produced').textContent = ok + fail;
  document.getElementById('stat_ok').textContent = ok;
  document.getElementById('stat_fail').textContent = fail;
  document.getElementById('stat_errors').textContent = fail;
  if (parts.length === 0) {
    document.getElementById('output').innerHTML = '<div class="flex flex-col items-center justify-center h-full gap-3 text-muted"><div class="text-[2.5rem] opacity-30">⚠️</div><p class="font-mono text-[0.72rem] tracking-widest uppercase opacity-50">Geçerli INSERT sorgusu bulunamadı</p></div>';
    return;
  }
  document.getElementById('output').innerHTML = parts.join('\n\n');
  if (ok > 0) showToast(ok + ' sorgu dönüştürüldü ✓');
}

function clearInput() { document.getElementById('input').value = ''; updateInputStats(); }
function clearOutput() {
  document.getElementById('output').innerHTML = '<div class="flex flex-col items-center justify-center h-full gap-3 text-muted"><div class="text-[2.5rem] opacity-30">⚡</div><p class="font-mono text-[0.72rem] tracking-widest uppercase opacity-50">Dönüştürülmüş sorgular burada görünecek</p></div>';
  ['stat_produced','stat_ok','stat_fail'].forEach(id => document.getElementById(id).textContent = '0');
  lastResults = [];
}
function copyAll() {
  const text = lastResults.filter(Boolean).join('\n\n');
  if (!text) { showToast('Kopyalanacak içerik yok'); return; }
  navigator.clipboard.writeText(text).then(() => showToast('Panoya kopyalandı ✓'));
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('opacity-100', '!translate-y-0');
  t.classList.remove('opacity-0', 'translate-y-5');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    t.classList.remove('opacity-100', '!translate-y-0');
    t.classList.add('opacity-0', 'translate-y-5');
  }, 2200);
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); convert(); }
});

updateInputStats();
</script>
</body>
</html>
