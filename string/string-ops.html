<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />
    <title>String Ops</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @variant dark (&:where(.dark, .dark *));
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        .code-editor-wrapper {
            position: relative;
            resize: vertical;
            overflow: hidden;
            min-height: 200px;
            max-height: 75vh;
        }
        .code-editor,
        .code-highlight {
            margin: 0;
            padding: 1rem;
            border: 0;
            font-family: 'Consolas', 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            line-height: 1.5;
            letter-spacing: 0;
            white-space: pre;
            word-wrap: normal;
            overflow-wrap: normal;
            tab-size: 4;
            -moz-tab-size: 4;
        }
        .code-editor {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: transparent;
            caret-color: #000;
            background: transparent;
            outline: none;
            resize: none;
            z-index: 2;
            overflow: auto;
        }
        body.dark .code-editor {
            caret-color: #fff;
        }
        .code-highlight {
            pointer-events: none;
            overflow: auto;
            height: 100%;
        }
        .code-highlight code {
            display: inline;
            white-space: pre;
            font: inherit;
            letter-spacing: inherit;
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 p-6 transition-colors pb-[calc(5vh_+_4rem)]">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-center flex-1">String Operations</h1>
            <div class="flex gap-2">
                <button id="themeToggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors" title="Toggle theme">
                    <svg class="w-6 h-6 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    <svg class="w-6 h-6 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                    </svg>
                </button>
                <button id="resetTheme" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors" title="Reset to system theme">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Input and Output Row -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <!-- Text Input -->
            <div class="flex flex-col">
                <label class="text-lg font-semibold mb-2">Input</label>
                <textarea 
                    id="textInput" 
                    class="p-4 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none min-h-[250px] max-h-[40vh] overflow-auto"
                    placeholder="Enter your text here...">Hello, World!</textarea>
            </div>

            <!-- Output Box -->
            <div class="flex flex-col">
                <label class="text-lg font-semibold mb-2">Output</label>
                <div class="relative">
                    <div id="output" class="p-4 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg min-h-[250px] max-h-[40vh] whitespace-pre-wrap font-mono text-sm overflow-auto"></div>
                    <button 
                        id="copyBtn" 
                        class="absolute top-3 right-6 p-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded-lg transition-colors opacity-0 hover:opacity-100 focus:opacity-100"
                        title="Copy output">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- JavaScript Code Editor -->
        <div class="mb-6">
            <label class="text-lg font-semibold mb-2 block">JavaScript Code</label>
            <div class="code-editor-wrapper bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg min-h-[200px]">
                <pre class="code-highlight m-0"><code id="codeHighlight" class="language-javascript"></code></pre>
                <textarea 
                    id="codeInput" 
                    class="code-editor"
                    spellcheck="false"
                    placeholder="// Enter JavaScript code here...&#x0A;// Use 'input' variable for the text&#x0A;return input.toUpperCase();">// Use 'input' variable for the text
// Return the processed result
return input.toUpperCase();</textarea>
            </div>
        </div>

        <!-- Execute Buttons -->
        <div class="text-center mb-6">
            <button 
                id="executeBtn" 
                class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold transition-colors">
                Run
            </button>
            <button 
                id="clearBtn" 
                class="px-8 py-3 bg-gray-300 dark:bg-gray-700 hover:bg-gray-400 dark:hover:bg-gray-600 rounded-lg font-semibold transition-colors ml-4">
                Clear
            </button>
        </div>

        <!-- Error Display -->
        <div id="errorBox" class="mt-4 p-4 bg-red-100 dark:bg-red-900/50 border border-red-400 dark:border-red-700 rounded-lg hidden">
            <div class="font-semibold text-red-800 dark:text-red-400 mb-1">Error:</div>
            <div id="errorMessage" class="text-red-700 dark:text-red-300 font-mono text-sm"></div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const codeInput = document.getElementById('codeInput');
        const resetTheme = document.getElementById('resetTheme');
        const codeHighlight = document.getElementById('codeHighlight');
        const executeBtn = document.getElementById('executeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const output = document.getElementById('output');
        const errorBox = document.getElementById('errorBox');
        const errorMessage = document.getElementById('errorMessage');
        const themeToggle = document.getElementById('themeToggle');
        const hljsLight = document.getElementById('hljs-light');
        const hljsDark = document.getElementById('hljs-dark');

        // Auto-resize textarea
        function autoResizeTextarea() {
            textInput.style.height = 'auto';
            const newHeight = Math.min(Math.max(textInput.scrollHeight, 250), 500);
            textInput.style.height = newHeight + 'px';
        }

        textInput.addEventListener('input', autoResizeTextarea);
        autoResizeTextarea(); // Initial resize

        // Theme management
        function setTheme(isDark) {
            if (isDark) {
                document.body.classList.add('dark');
                hljsLight.disabled = true;
                hljsDark.disabled = false;
            } else {
                document.body.classList.remove('dark');
                hljsLight.disabled = false;
                hljsDark.disabled = true;
            }
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateHighlight();
        }

        // Initialize theme from localStorage or browser preference
        const savedTheme = localStorage.getItem('theme');
        let isDark;
        
        if (savedTheme) {
            // User has explicitly set a preference
            isDark = savedTheme === 'dark';
        } else {
            // Check browser/system preference
            isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        
        setTheme(isDark);

        // Theme toggle
        themeToggle.addEventListener('click', () => {
            const isDark = document.body.classList.contains('dark');
            setTheme(!isDark);
        });

        // Reset theme to system preference
        resetTheme.addEventListener('click', () => {
            localStorage.removeItem('theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            setTheme(systemDark);
        });

        // Update syntax highlighting
        function updateHighlight() {
            const code = codeInput.value;
            const highlighted = hljs.highlight(code, { language: 'javascript' }).value;
            // Add a trailing newline to match textarea rendering
            codeHighlight.innerHTML = highlighted + '\n';
        }

        // Sync scroll between textarea and highlight
        codeInput.addEventListener('scroll', () => {
            codeHighlight.scrollTop = codeInput.scrollTop;
            codeHighlight.scrollLeft = codeInput.scrollLeft;
        });

        // Update highlighting on input
        codeInput.addEventListener('input', updateHighlight);

        // Handle tab key in textarea
        codeInput.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = codeInput.selectionStart;
                const end = codeInput.selectionEnd;
                const value = codeInput.value;
                codeInput.value = value.substring(0, start) + '    ' + value.substring(end);
                codeInput.selectionStart = codeInput.selectionEnd = start + 4;
                updateHighlight();
            }
        });

        // Execute code
        executeBtn.addEventListener('click', () => {
            errorBox.classList.add('hidden');
            const input = textInput.value;
            const code = codeInput.value;

            try {
                // Create a function from the code
                const func = new Function('input', code);
                const result = func(input);
                const resultStr = result !== undefined ? String(result) : '';
                
                // Check if result is JSON and highlight it
                try {
                    JSON.parse(resultStr); // Just validate it's JSON
                    const highlighted = hljs.highlight(resultStr, { language: 'json' }).value;
                    output.innerHTML = highlighted;
                } catch (e) {
                    // Not JSON, display as plain text
                    output.textContent = resultStr;
                }
            } catch (error) {
                errorBox.classList.remove('hidden');
                errorMessage.textContent = error.message;
                output.textContent = '';
            }
        });

        // Clear output
        clearBtn.addEventListener('click', () => {
            output.textContent = '';
            errorBox.classList.add('hidden');
        });

        // Copy output to clipboard
        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(output.textContent);
                // Visual feedback - change to checkmark
                const originalHTML = copyBtn.innerHTML;
                copyBtn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
                setTimeout(() => {
                    copyBtn.innerHTML = originalHTML;
                }, 1000);
            } catch (err) {
                console.error('Failed to copy:', err);
            }
        });

        // Show copy button when output has content
        const outputObserver = new MutationObserver(() => {
            if (output.textContent.trim()) {
                copyBtn.style.opacity = '0.7';
            } else {
                copyBtn.style.opacity = '0';
            }
        });
        outputObserver.observe(output, { childList: true, characterData: true, subtree: true });

        // Initial highlight
        updateHighlight();

        // Execute on Ctrl+Enter
        codeInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                executeBtn.click();
            }
        });

        textInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                executeBtn.click();
            }
        });
    </script>
</body>

</html>
