<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Data Viewer</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
        <style>
            /* Override highlight.js background to match our design */
            .hljs {
                background: transparent !important;
                padding: 0 !important;
            }
        </style>
    </head>
    <body class="bg-slate-100 p-8 pb-[calc(10vh+4rem)]">
        <div id="appContainer" class="max-w-[1920px] mx-auto">
            <h1 class="text-3xl font-bold text-slate-800 mb-6">Data Viewer</h1>

            <!-- Input Section -->
            <div class="bg-white rounded-lg shadow p-6 mb-12">
                <div class="flex gap-4 items-start">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-slate-700 mb-2"> Paste JSON Data </label>
                        <textarea
                            id="jsonInput"
                            rows="4"
                            class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"
                            placeholder='[{"name": "John", "age": 30}, {"name": "Jane", "age": 25}]'
                        ></textarea>
                    </div>

                    <div class="w-80">
                        <label class="block text-sm font-medium text-slate-700 mb-2"> Or Upload JSON File </label>
                        <input
                            type="file"
                            id="fileInput"
                            accept=".json"
                            class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                        />
                    </div>

                    <div class="flex flex-col gap-2 pt-7">
                        <button
                            id="loadBtn"
                            class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-md transition whitespace-nowrap"
                        >
                            Load Data
                        </button>

                        <button
                            id="clearBtn"
                            class="bg-slate-500 hover:bg-slate-600 text-white font-medium py-2 px-6 rounded-md transition whitespace-nowrap"
                        >
                            Clear
                        </button>
                    </div>
                </div>
            </div>

            <!-- Error Display -->
            <div
                id="errorMsg"
                class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-md mb-6"
            ></div>

            <!-- Table Section -->
            <div id="tableWrapper" class="hidden">
                <div class="flex justify-end gap-2 mb-2">
                    <div class="relative">
                        <button
                            id="toggleColumnsBtn"
                            class="px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-md hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm"
                            title="Toggle columns"
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"></path>
                            </svg>
                        </button>
                        <div
                            id="columnsDropdown"
                            class="hidden absolute right-0 mt-2 w-64 bg-white border border-slate-300 rounded-md shadow-lg z-50 max-h-96 overflow-y-auto"
                        >
                            <div class="p-3">
                                <div class="text-xs font-semibold text-slate-600 mb-2 pb-2 border-b border-slate-200">Toggle Columns</div>
                                <div id="columnCheckboxes" class="space-y-2"></div>
                            </div>
                        </div>
                    </div>
                    <button
                        id="toggleWidthBtn"
                        class="px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-md hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm"
                        title="Toggle full width"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 12h16M7 9l-3 3 3 3m10-6l3 3-3 3"></path>
                        </svg>
                    </button>
                </div>
                <div id="tableContainer" class="bg-white rounded-lg shadow overflow-hidden">
                    <div class="overflow-x-auto max-h-[calc(90vh-100px)] overflow-y-auto">
                    <table id="dataTable" class="min-w-full divide-y divide-slate-200">
                        <thead class="bg-white sticky top-0 z-10">
                            <tr id="tableHeader" class="bg-slate-200"></tr>
                            <tr id="filterRow" class="bg-slate-100 border-t border-slate-300"></tr>
                        </thead>
                        <tbody id="tableBody" class="bg-white divide-y divide-slate-200"></tbody>
                    </table>
                </div>
            </div>
            </div>

            <!-- Text Modal -->
            <div
                id="textModal"
                class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4"
            >
                <div class="bg-white rounded-lg shadow-xl max-w-3xl w-full max-h-[80vh] flex flex-col">
                    <div class="flex items-center justify-between p-4 border-b border-slate-200">
                        <h3 class="text-lg font-semibold text-slate-800">Full Text</h3>
                        <button id="closeModal" class="text-slate-400 hover:text-slate-600 text-2xl leading-none">
                            &times;
                        </button>
                    </div>
                    <div class="p-6 overflow-y-auto flex-1 bg-slate-50">
                        <pre
                            id="modalText"
                            class="whitespace-pre-wrap break-words font-mono text-sm text-slate-700"
                        ></pre>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const jsonInput = document.getElementById("jsonInput");
            const fileInput = document.getElementById("fileInput");
            const loadBtn = document.getElementById("loadBtn");
            const clearBtn = document.getElementById("clearBtn");
            const errorMsg = document.getElementById("errorMsg");
            const tableWrapper = document.getElementById("tableWrapper");
            const tableContainer = document.getElementById("tableContainer");
            const tableHeader = document.getElementById("tableHeader");
            const tableBody = document.getElementById("tableBody");
            const filterRow = document.getElementById("filterRow");

            let originalData = [];
            let columnKeys = [];
            let filters = {};
            let sortColumn = null;
            let sortDirection = "asc";
            let fullTextStore = new Map();
            let textIdCounter = 0;
            let isFullWidth = false;
            let hiddenColumns = new Set();

            // Toggle full width
            const toggleWidthBtn = document.getElementById("toggleWidthBtn");
            const appContainer = document.getElementById("appContainer");

            toggleWidthBtn.addEventListener("click", () => {
                isFullWidth = !isFullWidth;
                if (isFullWidth) {
                    appContainer.classList.remove("max-w-[1920px]");
                    appContainer.classList.add("max-w-full");
                } else {
                    appContainer.classList.remove("max-w-full");
                    appContainer.classList.add("max-w-[1920px]");
                }
            });

            // Toggle columns dropdown
            const toggleColumnsBtn = document.getElementById("toggleColumnsBtn");
            const columnsDropdown = document.getElementById("columnsDropdown");
            const columnCheckboxes = document.getElementById("columnCheckboxes");

            toggleColumnsBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                columnsDropdown.classList.toggle("hidden");
            });

            // Close dropdown when clicking outside
            document.addEventListener("click", (e) => {
                if (!columnsDropdown.contains(e.target) && e.target !== toggleColumnsBtn) {
                    columnsDropdown.classList.add("hidden");
                }
            });

            // Debounce function with support for dynamic delay
            function debounce(func, wait) {
                let timeout;
                return function executedFunction(...args) {
                    const later = () => {
                        clearTimeout(timeout);
                        func(...args);
                    };
                    clearTimeout(timeout);
                    // If wait is a function, call it to get the delay value
                    const delay = typeof wait === "function" ? wait() : wait;
                    timeout = setTimeout(later, delay);
                };
            }

            // Populate column checkboxes
            function populateColumnCheckboxes(keys) {
                columnCheckboxes.innerHTML = keys.map((key, index) => `
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-50 px-2 py-1 rounded">
                        <input 
                            type="checkbox" 
                            class="column-checkbox w-4 h-4 text-blue-600 rounded focus:ring-2 focus:ring-blue-500" 
                            data-column="${escapeHtml(key)}"
                            data-index="${index}"
                            ${!hiddenColumns.has(key) ? 'checked' : ''}
                        />
                        <span class="text-sm text-slate-700">${escapeHtml(key)}</span>
                    </label>
                `).join('');

                // Add event listeners to checkboxes
                columnCheckboxes.querySelectorAll('.column-checkbox').forEach(checkbox => {
                    checkbox.addEventListener('change', (e) => {
                        const columnKey = e.target.getAttribute('data-column');
                        const columnIndex = parseInt(e.target.getAttribute('data-index'));
                        
                        if (e.target.checked) {
                            hiddenColumns.delete(columnKey);
                        } else {
                            hiddenColumns.add(columnKey);
                        }
                        
                        toggleColumnVisibility(columnIndex, e.target.checked);
                    });
                });
            }

            // Toggle column visibility
            function toggleColumnVisibility(columnIndex, show) {
                const headerCells = document.querySelectorAll(`#tableHeader th`);
                const filterCells = document.querySelectorAll(`#filterRow th`);
                const bodyCells = document.querySelectorAll(`#tableBody tr`);
                
                // +2 to account for row number and original index columns
                const actualIndex = columnIndex + 2;
                
                // Toggle header
                if (headerCells[actualIndex]) {
                    headerCells[actualIndex].classList.toggle('hidden', !show);
                }
                
                // Toggle filter row
                if (filterCells[actualIndex]) {
                    filterCells[actualIndex].classList.toggle('hidden', !show);
                }
                
                // Toggle body cells
                bodyCells.forEach(row => {
                    const cells = row.querySelectorAll('td');
                    if (cells[actualIndex]) {
                        cells[actualIndex].classList.toggle('hidden', !show);
                    }
                });
            }

            // Load data from text input or file
            loadBtn.addEventListener("click", () => {
                const textData = jsonInput.value.trim();

                if (textData) {
                    try {
                        const data = JSON.parse(textData);
                        renderTable(data);
                    } catch (error) {
                        showError("Invalid JSON: " + error.message);
                    }
                } else if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const reader = new FileReader();

                    reader.onload = (e) => {
                        try {
                            const data = JSON.parse(e.target.result);
                            renderTable(data);
                        } catch (error) {
                            showError("Invalid JSON in file: " + error.message);
                        }
                    };

                    reader.readAsText(file);
                } else {
                    showError("Please provide JSON data or select a file");
                }
            });

            // Clear all
            clearBtn.addEventListener("click", () => {
                jsonInput.value = "";
                fileInput.value = "";
                errorMsg.classList.add("hidden");
                tableWrapper.classList.add("hidden");
                tableHeader.innerHTML = "";
                tableBody.innerHTML = "";
            });

            // Render table from data
            function renderTable(data) {
                errorMsg.classList.add("hidden");

                // If not an array, wrap it in an array
                if (!Array.isArray(data)) {
                    data = [data];
                }

                if (data.length === 0) {
                    showError("Data array is empty");
                    return;
                }

                // Check if data is an array of primitives (strings, numbers, etc.)
                const firstItem = data[0];
                const isPrimitiveArray = typeof firstItem !== "object" || firstItem === null;

                if (isPrimitiveArray) {
                    // Convert primitives to objects with "value" property
                    data = data.map((item) => ({ value: item }));
                }

                // Store original data with indexes
                originalData = data.map((item, idx) => ({ ...item, __originalIndex: idx }));

                // Get all unique keys from all objects
                const keys = [...new Set(data.flatMap((obj) => Object.keys(obj)))].filter(
                    (k) => k !== "__originalIndex"
                );
                columnKeys = keys;

                // Populate column checkboxes
                populateColumnCheckboxes(keys);

                // Create header
                tableHeader.innerHTML = `
                    <th class="px-4 py-3 text-left text-xs font-medium text-slate-700 tracking-wider">
                        #
                    </th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-slate-700 tracking-wider cursor-pointer hover:bg-slate-300 select-none" id="header-original">
                        <div class="flex items-center gap-1">
                            <span>Idx</span>
                            <span id="sort-icon-original" class="text-slate-400 opacity-0">▼</span>
                        </div>
                    </th>
                    ${keys
                        .map(
                            (key, index) => `
                        <th class="px-4 py-3 text-left text-xs font-medium text-slate-700 tracking-wider cursor-pointer hover:bg-slate-300 select-none" id="header-${index}" data-key="${escapeHtml(
                                key
                            )}">
                            <div class="flex items-center gap-1">
                                <span>${escapeHtml(key)}</span>
                                <span id="sort-icon-${index}" class="text-slate-400 opacity-0">▼</span>
                            </div>
                        </th>
                    `
                        )
                        .join("")}
                `;

                // Add sort event listener for original index column
                const headerOriginal = document.getElementById("header-original");
                headerOriginal.addEventListener("click", () => {
                    // Toggle sort direction if clicking the same column
                    if (sortColumn === "__originalIndex") {
                        sortDirection = sortDirection === "asc" ? "desc" : "asc";
                    } else {
                        sortColumn = "__originalIndex";
                        sortDirection = "asc";
                    }

                    // Update sort icons
                    const iconOriginal = document.getElementById("sort-icon-original");
                    iconOriginal.classList.remove("opacity-0");
                    iconOriginal.textContent = sortDirection === "asc" ? "▲" : "▼";

                    keys.forEach((_, i) => {
                        const icon = document.getElementById(`sort-icon-${i}`);
                        icon.classList.add("opacity-0");
                    });

                    renderTableBody(applyFilterLogic(originalData));
                });

                // Add sort event listeners to headers
                keys.forEach((key, index) => {
                    const header = document.getElementById(`header-${index}`);
                    header.addEventListener("click", () => {
                        // Toggle sort direction if clicking the same column
                        if (sortColumn === key) {
                            sortDirection = sortDirection === "asc" ? "desc" : "asc";
                        } else {
                            sortColumn = key;
                            sortDirection = "asc";
                        }

                        // Update sort icons
                        const iconOriginal = document.getElementById("sort-icon-original");
                        iconOriginal.classList.add("opacity-0");

                        keys.forEach((_, i) => {
                            const icon = document.getElementById(`sort-icon-${i}`);
                            if (i === index) {
                                icon.classList.remove("opacity-0");
                                icon.textContent = sortDirection === "asc" ? "▲" : "▼";
                            } else {
                                icon.classList.add("opacity-0");
                            }
                        });

                        renderTableBody(applyFilterLogic(originalData));
                    });
                });

                // Create filter row - for all columns
                filterRow.innerHTML = `
                    <th class="px-4 py-2"></th>
                    <th class="px-4 py-2"></th>
                    ${keys
                        .map((key, index) => {
                            return `
                            <th class="px-4 py-2">
                                <div class="flex gap-1 items-center">
                                    <select id="filter-op-${index}" class="text-xs border border-slate-300 rounded px-1 py-1 focus:outline-none focus:ring-1 focus:ring-blue-500">
                                        <option value="=" title="equals">=</option>
                                        <option value="!=" title="not equals">!=</option>
                                        <option value="contains" title="contains">⊂</option>
                                        <option value=">" title="greater than">&gt;</option>
                                        <option value="<" title="less than">&lt;</option>
                                        <option value=">=" title="greater than or equal">&gt;=</option>
                                        <option value="<=" title="less than or equal">&lt;=</option>
                                        <option value="empty" title="is empty">∅</option>
                                        <option value="notempty" title="is not empty">!∅</option>
                                        <option value="custom" title="custom expression">fx</option>
                                    </select>
                                    <input
                                        type="text"
                                        id="filter-val-${index}"
                                        placeholder="value"
                                        class="text-xs border border-slate-300 rounded px-2 py-1 w-20 focus:outline-none focus:ring-1 focus:ring-blue-500"
                                    />
                                </div>
                            </th>
                            `;
                        })
                        .join("")}
                `;

                // Add filter event listeners for all columns
                keys.forEach((key, index) => {
                    const filterOp = document.getElementById(`filter-op-${index}`);
                    const filterVal = document.getElementById(`filter-val-${index}`);

                    const applyFilters = () => {
                        // Disable value input for empty and notempty operators
                        if (filterOp.value === "empty" || filterOp.value === "notempty") {
                            filterVal.disabled = true;
                            filterVal.value = "";
                        } else {
                            filterVal.disabled = false;
                        }

                        // Make input wider for custom expressions
                        if (filterOp.value === "custom") {
                            filterVal.classList.remove("w-20");
                            filterVal.classList.add("w-40");
                            filterVal.placeholder = "row.col == value";
                        } else if (!filterVal.disabled) {
                            filterVal.classList.remove("w-40");
                            filterVal.classList.add("w-20");
                            filterVal.placeholder = "value";
                        }

                        filters[key] = {
                            operator: filterOp.value,
                            value: filterVal.value,
                        };
                        renderTableBody(applyFilterLogic(originalData));

                        // Scroll table into view after filtering
                        tableContainer.scrollIntoView({ behavior: "smooth", block: "center" });
                    };

                    // Apply immediately on operator change
                    filterOp.addEventListener("change", () => {
                        applyFilters();
                        // Focus the value input if it's enabled
                        if (!filterVal.disabled) {
                            filterVal.focus();
                        }
                    });

                    // Apply with debounce on value input (dynamic delay based on operator)
                    filterVal.addEventListener(
                        "input",
                        debounce(applyFilters, () => (filterOp.value === "custom" ? 2000 : 500))
                    );
                });

                renderTableBody(originalData);

                // Apply hidden columns
                applyHiddenColumns();

                tableWrapper.classList.remove("hidden");

                // Scroll table into view
                tableContainer.scrollIntoView({ behavior: "smooth", block: "center" });
            }

            // Apply hidden columns to the table
            function applyHiddenColumns() {
                columnKeys.forEach((key, index) => {
                    if (hiddenColumns.has(key)) {
                        toggleColumnVisibility(index, false);
                    }
                });
            }

            // Render table body
            function renderTableBody(data) {
                // Apply sorting if a column is selected
                if (sortColumn !== null) {
                    data = [...data].sort((a, b) => {
                        const aVal = a[sortColumn];
                        const bVal = b[sortColumn];

                        // Handle null/undefined
                        if (aVal === null || aVal === undefined) return 1;
                        if (bVal === null || bVal === undefined) return -1;

                        // Try numeric comparison
                        const aNum = parseFloat(aVal);
                        const bNum = parseFloat(bVal);

                        if (!isNaN(aNum) && !isNaN(bNum)) {
                            return sortDirection === "asc" ? aNum - bNum : bNum - aNum;
                        }

                        // String comparison (case-insensitive)
                        const aStr = String(aVal).toLowerCase();
                        const bStr = String(bVal).toLowerCase();

                        if (aStr < bStr) return sortDirection === "asc" ? -1 : 1;
                        if (aStr > bStr) return sortDirection === "asc" ? 1 : -1;
                        return 0;
                    });
                }

                if (data.length === 0) {
                    // Show empty state row
                    tableBody.innerHTML = `
                        <tr>
                            <td colspan="${columnKeys.length + 2}" class="px-4 py-8 text-center text-slate-400 text-sm">
                                No records found
                            </td>
                        </tr>
                    `;
                    return;
                }

                // Create rows
                tableBody.innerHTML = data
                    .map(
                        (row, index) => `
                    <tr class="hover:bg-slate-50">
                        <td class="px-4 py-2 whitespace-nowrap text-sm font-medium text-slate-900">
                            ${index + 1}
                        </td>
                        <td class="px-4 py-2 whitespace-nowrap text-sm text-slate-600">
                            ${row.__originalIndex}
                        </td>
                        ${columnKeys
                            .map((key) => {
                                const value = row[key];
                                let displayValue;
                                let cellClass = "px-4 py-2 text-sm text-slate-700";

                                if (value === undefined || value === null) {
                                    displayValue = '<span class="text-red-400" title="N/A">&mdash;</span>';
                                } else if (typeof value === "object") {
                                    const jsonStr = JSON.stringify(value, null, 2);
                                    if (jsonStr.length > 100) {
                                        const textId = `text-${textIdCounter++}`;
                                        fullTextStore.set(textId, jsonStr);
                                        const preview = JSON.stringify(value);
                                        displayValue = `<code class="text-xs bg-slate-50 text-slate-800 px-2 py-1 rounded cursor-pointer hover:bg-slate-100 inline-block max-w-full overflow-hidden border border-slate-200" data-text-id="${textId}"><span class="hljs language-json">${highlightJson(
                                            preview.substring(0, 100)
                                        )}</span>...</code>`;
                                        cellClass += " truncated-cell";
                                    } else {
                                        displayValue = `<code class="text-xs bg-slate-50 text-slate-800 px-2 py-1 rounded whitespace-pre block border border-slate-200"><span class="hljs language-json">${highlightJson(
                                            jsonStr
                                        )}</span></code>`;
                                    }
                                } else {
                                    const strValue = String(value);
                                    
                                    if (strValue.length > 100) {
                                        // Long text: show truncated with popup (URL or not)
                                        const textId = `text-${textIdCounter++}`;
                                        fullTextStore.set(textId, strValue);
                                        displayValue = `<span class="cursor-pointer text-blue-600 hover:text-blue-800" data-text-id="${textId}">${escapeHtml(
                                            strValue.substring(0, 100)
                                        )}...</span>`;
                                        cellClass += " truncated-cell";
                                    } else if (isUrl(strValue)) {
                                        // Short URL: show as clickable link
                                        displayValue = `<a href="${escapeHtml(strValue)}" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:text-blue-800 underline">${escapeHtml(strValue)}</a>`;
                                    } else {
                                        // Short non-URL text: just display
                                        displayValue = escapeHtml(strValue);
                                    }
                                }

                                return `<td class="${cellClass}">${displayValue}</td>`;
                            })
                            .join("")}
                    </tr>
                `
                    )
                    .join("");
            }

            // Apply filter logic
            function applyFilterLogic(data) {
                return data.filter((row) => {
                    for (const [key, filter] of Object.entries(filters)) {
                        // For empty operator, no value is needed
                        if (filter.operator === "empty") {
                            const rowValue = row[key];
                            const isEmpty = rowValue === null || rowValue === undefined || rowValue === "";
                            if (!isEmpty) return false;
                            continue;
                        }

                        // For notempty operator, no value is needed
                        if (filter.operator === "notempty") {
                            const rowValue = row[key];
                            const isEmpty = rowValue === null || rowValue === undefined || rowValue === "";
                            if (isEmpty) return false;
                            continue;
                        }

                        // For custom operator, evaluate JavaScript expression
                        if (filter.operator === "custom") {
                            if (!filter.value) continue;
                            try {
                                const fn = new Function("row", `return ${filter.value}`);
                                if (!fn(row)) return false;
                            } catch (error) {
                                console.warn("Invalid custom filter expression:", error);
                                // Skip invalid expressions
                            }
                            continue;
                        }

                        if (!filter.operator || filter.value === "") continue;

                        const rowValue = row[key];
                        const filterValue = filter.value;

                        // Try to parse as number if possible
                        const numRowValue = parseFloat(rowValue);
                        const numFilterValue = parseFloat(filterValue);

                        const useNumeric = !isNaN(numRowValue) && !isNaN(numFilterValue);

                        // Use case-insensitive comparison for strings
                        const compareRowValue = useNumeric ? numRowValue : String(rowValue).toLowerCase();
                        const compareFilterValue = useNumeric ? numFilterValue : String(filterValue).toLowerCase();

                        switch (filter.operator) {
                            case "=":
                                if (compareRowValue != compareFilterValue) return false;
                                break;
                            case "!=":
                                if (compareRowValue == compareFilterValue) return false;
                                break;
                            case ">":
                                if (compareRowValue <= compareFilterValue) return false;
                                break;
                            case "<":
                                if (compareRowValue >= compareFilterValue) return false;
                                break;
                            case ">=":
                                if (compareRowValue < compareFilterValue) return false;
                                break;
                            case "<=":
                                if (compareRowValue > compareFilterValue) return false;
                                break;
                            case "contains":
                                const rowStr = String(rowValue || "").toLowerCase();
                                const filterStr = String(filterValue).toLowerCase();
                                if (!rowStr.includes(filterStr)) return false;
                                break;
                        }
                    }
                    return true;
                });
            }

            // Show error message
            function showError(message) {
                errorMsg.textContent = message;
                errorMsg.classList.remove("hidden");
                tableWrapper.classList.add("hidden");
            }

            // Escape HTML to prevent XSS
            function escapeHtml(text) {
                const div = document.createElement("div");
                div.textContent = text;
                return div.innerHTML;
            }

            // Check if a string is a URL
            function isUrl(str) {
                if (typeof str !== 'string') return false;
                try {
                    const url = new URL(str);
                    return url.protocol === 'http:' || url.protocol === 'https:';
                } catch {
                    return false;
                }
            }

            // Convert URLs in text to clickable links
            function linkifyUrls(text) {
                if (typeof text !== 'string') return escapeHtml(String(text));
                
                // URL regex pattern
                const urlPattern = /(https?:\/\/[^\s<>"]+)/g;
                
                // Find all URLs first, then escape and replace
                let lastIndex = 0;
                let result = '';
                let match;
                
                while ((match = urlPattern.exec(text)) !== null) {
                    // Escape the text before the URL
                    result += escapeHtml(text.substring(lastIndex, match.index));
                    
                    // Add the clickable link (escape the display text but not the href)
                    const url = match[0];
                    result += `<a href="${url}" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:text-blue-800 underline">${escapeHtml(url)}</a>`;
                    
                    lastIndex = match.index + url.length;
                }
                
                // Escape any remaining text after the last URL
                result += escapeHtml(text.substring(lastIndex));
                
                return result;
            }

            // Highlight JSON syntax with highlight.js
            function highlightJson(json) {
                if (typeof json !== 'string') return escapeHtml(String(json));
                
                // Use highlight.js to highlight JSON
                const highlighted = hljs.highlight(json, { language: 'json' }).value;
                
                // Now linkify URLs within the highlighted HTML
                // We need to be careful not to break the highlight.js markup
                return highlighted.replace(/(https?:\/\/[^\s<>"]+)/g, (url) => {
                    return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="underline hover:opacity-80">${url}</a>`;
                });
            }

            // Allow file drop
            fileInput.addEventListener("change", () => {
                jsonInput.value = "";
            });

            jsonInput.addEventListener("input", () => {
                fileInput.value = "";
            });

            // Modal controls
            const textModal = document.getElementById("textModal");
            const modalText = document.getElementById("modalText");
            const closeModal = document.getElementById("closeModal");

            // Show modal with full text
            function showFullText(text) {
                let content = text;
                let isJsonContent = false;
                
                // Try to parse as JSON if it's a string
                if (typeof text === 'string') {
                    try {
                        const parsed = JSON.parse(text);
                        // If successfully parsed and it's an object or array, format it
                        if (typeof parsed === 'object' && parsed !== null) {
                            content = JSON.stringify(parsed, null, 2);
                            isJsonContent = true;
                        }
                    } catch (e) {
                        // Not JSON, keep as is
                    }
                }
                
                const modalTextContainer = modalText.parentElement;
                
                // Apply appropriate formatting and styling
                if (isJsonContent) {
                    modalText.innerHTML = `<code class="hljs language-json">${highlightJson(content)}</code>`;
                    modalTextContainer.classList.add('bg-white');
                    modalTextContainer.classList.remove('bg-slate-50');
                    modalText.classList.add('text-slate-800');
                    modalText.classList.remove('text-slate-700');
                } else {
                    modalText.innerHTML = linkifyUrls(content);
                    modalTextContainer.classList.add('bg-slate-50');
                    modalTextContainer.classList.remove('bg-white');
                    modalText.classList.add('text-slate-700');
                    modalText.classList.remove('text-slate-800');
                }
                textModal.classList.remove("hidden");
            }

            // Close modal
            function hideModal() {
                textModal.classList.add("hidden");
                modalText.textContent = "";
            }

            closeModal.addEventListener("click", hideModal);

            // Close modal when clicking outside
            textModal.addEventListener("click", (e) => {
                if (e.target === textModal) {
                    hideModal();
                }
            });

            // Close modal with Escape key
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape" && !textModal.classList.contains("hidden")) {
                    hideModal();
                }
            });

            // Delegate click events for truncated text
            tableBody.addEventListener("click", (e) => {
                const target = e.target.closest("[data-text-id]");
                if (target) {
                    const textId = target.getAttribute("data-text-id");
                    const fullText = fullTextStore.get(textId);
                    if (fullText !== undefined) {
                        showFullText(fullText);
                    }
                }
            });
        </script>
    </body>
</html>
